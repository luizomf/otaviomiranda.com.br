name: Deploy to GitHub Pages

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # path: . # Caso o repositório não estivesse na raiz, mas está
          node-version: 24
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Optional: Opt into Node.js 24 early

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Optional: Opt into Node.js 24 early
